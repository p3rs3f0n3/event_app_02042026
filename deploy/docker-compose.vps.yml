services:
  eventapp-postgres:
    image: postgres:16-alpine
    container_name: eventapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - eventapp_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  eventapp-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: eventapp-backend
    restart: unless-stopped
    depends_on:
      eventapp-postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      REPOSITORY_DRIVER: postgres
      POSTGRES_HOST: eventapp-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${EVENTAPP_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SSL: false
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
    ports:
      - "3001:3001"

volumes:
  eventapp_postgres_data:
